<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soldier Health Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0e27;
      color: #00ff41;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #151b3d;
      border: 2px solid #00ff41;
      padding: 40px;
      border-radius: 8px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 24px;
      letter-spacing: 2px;
    }
    .metric {
      background: #0a0e27;
      padding: 20px;
      margin: 15px 0;
      border-left: 4px solid #00ff41;
    }
    .label {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 5px;
    }
    .value {
      font-size: 36px;
      font-weight: bold;
    }
    .status {
      text-align: center;
      padding: 10px;
      margin-top: 20px;
      border-radius: 4px;
      font-weight: bold;
    }
    .normal { background: #1a4d2e; color: #00ff41; }
    .warning { background: #4d3d1a; color: #ffaa00; }
    .critical { background: #4d1a1a; color: #ff4444; }
    .waiting { background: #1a1a4d; color: #4444ff; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚕ SOLDIER HEALTH MONITOR</h1>
    
    <div class="metric">
      <div class="label">HEART RATE</div>
      <div class="value" id="bpm">--</div>
      <div class="label">BPM</div>
    </div>

    <div class="metric">
      <div class="label">BODY TEMPERATURE</div>
      <div class="value" id="temp">--</div>
      <div class="label">°C</div>
    </div>

    <div id="status" class="status waiting">WAITING FOR DATA...</div>
  </div>

  <script>
    const API_URL = 'http://127.0.0.1:5000/latest';

    function updateUI(data) {
      const bpm = Number(data.bpm);
      const temp = Number(data.temp);

      document.getElementById('bpm').textContent =
        Number.isFinite(bpm) ? bpm : '--';
      document.getElementById('temp').textContent =
        Number.isFinite(temp) ? temp.toFixed(1) : '--';

      let status = 'NORMAL';
      let statusClass = 'normal';

      if (bpm > 120 || bpm < 40 || temp > 38.5 || temp < 35) {
        status = 'CRITICAL';
        statusClass = 'critical';
      } else if (bpm > 100 || bpm < 50 || temp > 37.5 || temp < 36) {
        status = 'WARNING';
        statusClass = 'warning';
      }

      const statusEl = document.getElementById('status');
      statusEl.textContent = status;
      statusEl.className = 'status ' + statusClass;
    }

    // Poll every 1 second
    setInterval(() => {
      fetch(API_URL)
        .then(res => res.json())
        .then(updateUI)
        .catch(err => console.error('Error:', err));
    }, 1000);
  </script>
</body>
</html>
